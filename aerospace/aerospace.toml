[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
m = ['fullscreen --no-outer-gaps', 'mode main']
cmd-alt-ctrl-shift-h = ['join-with left', 'mode main']
cmd-alt-ctrl-shift-j = ['join-with down', 'mode main']
cmd-alt-ctrl-shift-k = ['join-with up', 'mode main']
cmd-alt-ctrl-shift-l = ['join-with right', 'mode main']

down = 'volume down'
up = 'volume up'
shift-down = ['volume set 0', 'mode main']

[[on-window-detected]]
if.app-id = 'company.thebrowser.Browser'
run = "move-node-to-workspace A"

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = "move-node-to-workspace A"

[[on-window-detected]]
if.app-name-regex-substring = 'zen'
run = "move-node-to-workspace A"

[[on-window-detected]]
if.app-name-regex-substring = 'firefox'
run = "move-node-to-workspace A"

[[on-window-detected]]
if.app-id = 'com.apple.Safari'
run = "move-node-to-workspace B"

[[on-window-detected]]
if.app-id = 'com.openai.chat'
run = "move-node-to-workspace C"

[[on-window-detected]]
if.app-id = 'com.apple.iCal'
run = "move-node-to-workspace C"

[[on-window-detected]]
if.app-id = 'com.figma.Desktop'
run = "move-node-to-workspace F"

# === TEXT EDITORS ===
[[on-window-detected]]
if.app-id = 'com.apple.dt.Xcode'
run = "move-node-to-workspace X"

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = "move-node-to-workspace D"

[[on-window-detected]]
if.app-id = 'com.cmuxterm.app'
run = "move-node-to-workspace D"

[[on-window-detected]]
if.app-name-regex-substring = 'vscode'
run = "move-node-to-workspace I"

[[on-window-detected]]
if.app-name-regex-substring = 'zed'
run = "move-node-to-workspace I"

[[on-window-detected]]
if.app-id = 'com.google.android.studio'
run = "move-node-to-workspace I"

[[on-window-detected]]
if.app-id = 'com.google.android.studio-EAP'
run = "move-node-to-workspace I"

[[on-window-detected]]
if.app-id = 'com.google.antigravity'
run = "move-node-to-workspace I"

# === PRODUCTIVITY ===
[[on-window-detected]]
if.app-id = 'com.microsoft.teams2'
run = "move-node-to-workspace G"

[[on-window-detected]]
if.app-id = 'com.apple.mail'
run = "move-node-to-workspace M"

[[on-window-detected]]
if.app-id = 'com.apple.Notes'
run = "move-node-to-workspace N"

[[on-window-detected]]
if.app-id = 'com.apple.reminders'
run = "move-node-to-workspace R"

[[on-window-detected]]
if.app-name-regex-substring = 'telegram'
run = "move-node-to-workspace T"

# === MUSIC ===
[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = "move-node-to-workspace S"

[[on-window-detected]]
if.app-id = 'com.apple.Music'
run = "move-node-to-workspace S"

# === FLOATING ===
[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'NULL-APP-BUNDLE-ID'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.lbjlaq.antigravity-tools'
run = 'move-node-to-workspace 9'

[[on-window-detected]]
if.app-name-regex-substring = 'vibeproxy'
run = 'layout floating'
