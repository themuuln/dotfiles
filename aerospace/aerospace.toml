cmd-alt-ctrl-shift-0 = 'move-node-to-workspace 0 --focus-follows-window'
cmd-alt-ctrl-a = 'workspace A'
cmd-alt-ctrl-shift-a = 'move-node-to-workspace A --focus-follows-window'
cmd-alt-ctrl-b = 'workspace B'
cmd-alt-ctrl-shift-b = 'move-node-to-workspace B --focus-follows-window'
cmd-alt-ctrl-c = 'workspace C'
cmd-alt-ctrl-shift-c = 'move-node-to-workspace C --focus-follows-window'
cmd-alt-ctrl-d = 'workspace D'
cmd-alt-ctrl-shift-d = 'move-node-to-workspace D --focus-follows-window'
cmd-alt-ctrl-e = 'workspace E'
