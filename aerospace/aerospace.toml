# run this command for fix mission control size
# defaults write com.apple.dock expose-group-apps -bool true && killall Dock
# defaults write com.apple.spaces spans-displays -bool true && killall SystemUIServer

config-version = 2

# this is for border
# after-startup-command = [
#   'exec-and-forget borders active_color=0xff7AA2F8 inactive_color=0xff24283B width=5.0',
# ]

start-at-login = true
enable-normalization-opposite-orientation-for-nested-containers = true
enable-normalization-flatten-containers = true

accordion-padding = 50

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
automatically-unhide-macos-hidden-apps = true

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 0
inner.vertical = 0
outer.left = 0
outer.bottom = 0
outer.top = 0
outer.right = 0

[mode.main.binding]
cmd-alt-ctrl-slash = 'layout tiles horizontal vertical'
cmd-alt-ctrl-comma = 'layout accordion horizontal vertical'

cmd-alt-ctrl-enter = 'fullscreen --no-outer-gaps'
# cmd-alt-ctrl-enter = 'fullscreen'

cmd-alt-ctrl-h = 'focus left'
cmd-alt-ctrl-j = 'focus down'
cmd-alt-ctrl-k = 'focus up'
cmd-alt-ctrl-l = 'focus right'

cmd-alt-ctrl-shift-h = 'move left'
cmd-alt-ctrl-shift-j = 'move down'
cmd-alt-ctrl-shift-k = 'move up'
cmd-alt-ctrl-shift-l = 'move right'

cmd-alt-ctrl-shift-minus = 'resize smart -50'
cmd-alt-ctrl-shift-equal = 'resize smart +50'

cmd-alt-ctrl-1 = 'workspace 1'
cmd-alt-ctrl-shift-1 = 'move-node-to-workspace 1 --focus-follows-window'
cmd-alt-ctrl-2 = 'workspace 2'
cmd-alt-ctrl-shift-2 = 'move-node-to-workspace 2 --focus-follows-window'
cmd-alt-ctrl-3 = 'workspace 3'
cmd-alt-ctrl-shift-3 = 'move-node-to-workspace 3 --focus-follows-window'
cmd-alt-ctrl-4 = 'workspace 4'
cmd-alt-ctrl-shift-4 = 'move-node-to-workspace 4 --focus-follows-window'
cmd-alt-ctrl-5 = 'workspace 5'
cmd-alt-ctrl-shift-5 = 'move-node-to-workspace 5 --focus-follows-window'
cmd-alt-ctrl-6 = 'workspace 6'
cmd-alt-ctrl-shift-6 = 'move-node-to-workspace 6 --focus-follows-window'
