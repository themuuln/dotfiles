cmd-alt-ctrl-shift-p = 'move-node-to-workspace P --focus-follows-window'
cmd-alt-ctrl-q = 'workspace Q'
cmd-alt-ctrl-shift-q = 'move-node-to-workspace Q --focus-follows-window'
cmd-alt-ctrl-r = 'workspace R'
cmd-alt-ctrl-shift-r = 'move-node-to-workspace R --focus-follows-window'
cmd-alt-ctrl-s = 'workspace S'
cmd-alt-ctrl-shift-s = 'move-node-to-workspace S --focus-follows-window'
cmd-alt-ctrl-t = 'workspace T'
cmd-alt-ctrl-shift-t = 'move-node-to-workspace T --focus-follows-window'
cmd-alt-ctrl-u = 'workspace U'
cmd-alt-ctrl-shift-u = 'move-node-to-workspace U --focus-follows-window'
cmd-alt-ctrl-v = 'workspace V'
