cmd-alt-ctrl-y = 'workspace Y'
cmd-alt-ctrl-shift-y = 'move-node-to-workspace Y --focus-follows-window'
cmd-alt-ctrl-z = 'workspace Z'
cmd-alt-ctrl-shift-z = 'move-node-to-workspace Z --focus-follows-window'

cmd-alt-ctrl-semicolon = 'mode workspace'
cmd-alt-ctrl-shift-tab = 'move-workspace-to-monitor --wrap-around next'
cmd-alt-ctrl-shift-semicolon = 'mode service'

